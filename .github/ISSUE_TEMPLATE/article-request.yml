name: Article Request
description: Request a new technical article to be auto-generated by the write-article agent.
title: '[Article] '
labels: ['article']
body:
  - type: markdown
    attributes:
      value: |
        Describe the article you'd like written. The `write-article` agent will research the topic, draft the article, and open a PR for your review.

  - type: input
    id: topic
    attributes:
      label: Topic
      description: The core subject of the article.
      placeholder: 'e.g. React Server Components streaming patterns'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Additional context, specific angle, or points you want covered.
      placeholder: 'Focus on practical patterns over theory. Include a real-world dashboard example.'
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated technology tags for the article.
      placeholder: 'React, Server Components, Performance, Next.js'
    validations:
      required: false

  - type: dropdown
    id: audience
    attributes:
      label: Target Audience
      description: Who is this article written for?
      options:
        - Senior Engineers
        - Mid-level Engineers
        - Junior Engineers
      default: 0
    validations:
      required: false

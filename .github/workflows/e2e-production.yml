name: E2E Tests — Production

# Runs E2E tests against https://lennypeters.com on demand.
# Trigger manually from the Actions tab to verify the live site after a deploy
# or when debugging production-only issues.

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test (default: https://lennypeters.com)'
        required: false
        default: 'https://lennypeters.com'

jobs:
  e2e-production:
    name: E2E Tests — Production Domain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against production
        run: npm run test:e2e
        env:
          CI: true
          E2E_TEST_URL: ${{ inputs.url || 'https://lennypeters.com' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 7

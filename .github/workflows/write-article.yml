name: Write Article from Issue
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  write-article:
    if: github.event.label.name == 'article'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive slug from issue title
        id: slug
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 -]//g' \
            | sed 's/ /-/g' \
            | sed 's/--*/-/g' \
            | head -c 60)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=article/$SLUG" >> "$GITHUB_OUTPUT"

      - name: Create article branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.slug.outputs.branch }}"

      - name: Write article via Copilot
        uses: github/copilot-action@v1
        with:
          agent: write-article
          prompt: |
            Write a technical article about: ${{ github.event.issue.title }}

            Additional context from the issue:
            ${{ github.event.issue.body }}

      - name: Check for new article
        id: check
        run: |
          if git diff --name-only | grep -q "^content/articles/"; then
            echo "has_article=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_article=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.has_article == 'true'
        run: |
          git add content/articles/
          git commit -m "feat(article): add article — ${{ github.event.issue.title }}"
          git push origin "${{ steps.slug.outputs.branch }}"

      - name: Create Pull Request
        if: steps.check.outputs.has_article == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.slug.outputs.branch }}
          title: "feat(article): ${{ github.event.issue.title }}"
          body: |
            ## Auto-generated Article

            This article was generated by the `write-article` agent from issue #${{ github.event.issue.number }}.

            Closes #${{ github.event.issue.number }}
          assignees: ${{ github.event.issue.user.login }}

      - name: Comment on issue
        if: steps.check.outputs.has_article == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            The `write-article` agent has drafted an article for this topic. A pull request has been created on branch `${{ steps.slug.outputs.branch }}` for your review.

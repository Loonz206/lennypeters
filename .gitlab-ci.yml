image: node:22-alpine

stages:
  - lint
  - test
  - build
  - e2e
  - pages

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
  policy: pull

# ── Hidden base job ───────────────────────────────────────────────────────────
.install:
  before_script:
    - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull-push

# ── Lint ──────────────────────────────────────────────────────────────────────
lint:
  stage: lint
  extends: .install
  script:
    - npm run lint

# ── Unit tests ────────────────────────────────────────────────────────────────
unit-test:
  stage: test
  extends: .install
  script:
    - npm test -- --ci --coverage
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - coverage/
    expire_in: 7 days

# ── Build (static export) ─────────────────────────────────────────────────────
build:
  stage: build
  extends: .install
  script:
    - npm run build
  artifacts:
    paths:
      - out/
    expire_in: 7 days

# ── E2E tests (Playwright) ────────────────────────────────────────────────────
e2e:
  stage: e2e
  extends: .install
  image: mcr.microsoft.com/playwright:v1.51.0-noble
  variables:
    CI: "true"
    BASE_URL: "http://localhost:3000"
  dependencies:
    - build
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    # Serve the static export on port 3000 in the background
    - npx serve out -l 3000 &
    - SERVER_PID=$!
    # Give the server a moment to start
    - sleep 2
    # Point Playwright at the running server (skip the webServer auto-start)
    - npx playwright test --reporter=html
    - kill $SERVER_PID || true
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

# ── GitLab Pages deployment ───────────────────────────────────────────────────
pages:
  stage: pages
  dependencies:
    - build
  script:
    - rm -rf public
    - mv out public
  artifacts:
    paths:
      - public
  # Deploys on every branch; GitLab generates branch-specific preview URLs
  # alongside the main Pages site (https://<namespace>.gitlab.io/<project>)
